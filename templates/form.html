
<!DOCTYPE html>
<html>
<head>
    <title>CARDIO//OS — Risk Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #03050a;
    --panel: rgba(10, 15, 30, 0.85);
    --accent: #FFB800;
    --accent-secondary: #2E5BFF;
    --text: #e0e6ed;
    --dim: #6b7c93;
    --border: rgba(255, 184, 0, 0.25);
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.wrapper {
    width: 650px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: fadeIn 0.6s ease;
}

h2 {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 30px;
    text-align: center;
}

form {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.row {
    display: flex;
    gap: 15px;
}

.row input,
.row select {
    flex: 1;
}

input, select {
    padding: 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,184,0,0.15);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-size: 14px;
    transition: 0.3s;
}

input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(255,184,0,0.4);
}

select {
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--accent) 50%),
                      linear-gradient(135deg, var(--accent) 50%, transparent 50%);
    background-position: calc(100% - 20px) calc(50% - 4px),
                         calc(100% - 15px) calc(50% - 4px);
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
}

.toggle-group {
    display: flex;
    gap: 10px;
}

.toggle-group input {
    display: none;
}

.toggle-group label {
    flex: 1;
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,184,0,0.2);
    cursor: pointer;
    transition: 0.3s;
    background: rgba(255,255,255,0.03);
}

.toggle-group input:checked + label {
    background: linear-gradient(45deg, #FFB800, #2E5BFF);
    color: white;
    border-color: transparent;
}

button {
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(45deg, #FFB800, #2E5BFF);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

button:hover {
    transform: scale(1.04);
    box-shadow: 0 10px 25px rgba(255,184,0,0.3);
}

.result-container {
    text-align: center;
    animation: fadeSlide 0.6s ease;
}

.prediction-status {
    font-size: 30px;
    font-weight: 700;
    margin-top: 20px;
}

.low-risk { color: #00ff88; }
.high-risk { color: #ff4d4d; }

.risk-reasons {
    margin-top: 25px;
    text-align: left;
    background: rgba(255,184,0,0.05);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
}

ul {
    padding-left: 18px;
    color: var(--dim);
    font-size: 13px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes fadeSlide {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="wrapper">

{% if not prediction_text %}

<h2>DATA_ENTRY // PATIENT_INPUT</h2>

<form action="/predict" method="post">

    <div class="row">
        <input type="number" name="age" placeholder="Age (Years)" required>
        <select name="gender" required>
            <option value="">Gender</option>
            <option value="1">Female</option>
            <option value="2">Male</option>
        </select>
    </div>

    <div class="row">
        <input type="number" name="height" placeholder="Height (cm)" required>
        <input type="number" name="weight" placeholder="Weight (kg)" required>
    </div>

    <div class="row">
        <input type="number" name="ap_hi" placeholder="Systolic BP" required>
        <input type="number" name="ap_lo" placeholder="Diastolic BP" required>
    </div>

    <div class="row">
        <select name="cholesterol" required>
            <option value="">Cholesterol</option>
            <option value="1">Normal</option>
            <option value="2">Above Normal</option>
            <option value="3">High</option>
        </select>

        <select name="gluc" required>
            <option value="">Glucose</option>
            <option value="1">Normal</option>
            <option value="2">Above Normal</option>
            <option value="3">High</option>
        </select>
    </div>

    <div>
        <p style="margin-bottom:8px; color:var(--dim); font-size:13px;">Smoking</p>
        <div class="toggle-group">
            <input type="radio" id="smoke_no" name="smoke" value="0" required>
            <label for="smoke_no">No</label>
            <input type="radio" id="smoke_yes" name="smoke" value="1">
            <label for="smoke_yes">Yes</label>
        </div>
    </div>

    <div>
        <p style="margin-bottom:8px; color:var(--dim); font-size:13px;">Alcohol</p>
        <div class="toggle-group">
            <input type="radio" id="alco_no" name="alco" value="0" required>
            <label for="alco_no">No</label>
            <input type="radio" id="alco_yes" name="alco" value="1">
            <label for="alco_yes">Yes</label>
        </div>
    </div>

    <select name="active" required>
        <option value="">Physically Active</option>
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>

    <button type="submit">RUN ANALYSIS</button>
</form>

{% else %}

<div class="result-container">
    <h2>RESULT_OUTPUT // RISK_STATUS</h2>

    <div class="prediction-status 
        {% if 'Low' in prediction_text %}low-risk{% else %}high-risk{% endif %}">
        {{ prediction_text }}
    </div>

    {% if risk_reasons %}
    <div class="risk-reasons">
        <h4>KEY RISK FACTORS</h4>
        <ul>
            {% for reason in risk_reasons %}
                <li>{{ reason }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <form action="/" method="get">
        <button style="margin-top:30px;">ANALYZE ANOTHER</button>
    </form>
</div>

{% endif %}

</div>
</body>
</html>
